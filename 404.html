<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stránka nenalezena — Prodocum</title>
  <meta name="robots" content="noindex, nofollow">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --accent: #4f46e5;
      --accent-light: #eef2ff;
      --text: #1a1a2e;
      --text-secondary: #5a5a72;
      --text-tertiary: #9ca3af;
      --border: #e8e8ee;
      --bg: #fafafa;
      --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem 1.5rem;
      overflow: hidden;
    }

    /* Background dots */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, #4f46e5 1px, transparent 1px);
      background-size: 28px 28px;
      opacity: 0.045;
      pointer-events: none;
      z-index: 0;
    }

    /* Glow blobs */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 80% 20%, rgba(79,70,229,0.07) 0%, transparent 100%),
        radial-gradient(ellipse 50% 40% at 15% 80%, rgba(129,140,248,0.07) 0%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      max-width: 520px;
      width: 100%;
      animation: fadeUp 0.6s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* SVG ilustrace */
    .illustration {
      width: 180px;
      height: 180px;
      margin-bottom: 2.5rem;
      animation: float 4s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-10px); }
    }

    /* 404 číslo */
    .code {
      font-size: clamp(5rem, 18vw, 8rem);
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.04em;
      color: transparent;
      background: linear-gradient(135deg, #4f46e5 0%, #818cf8 100%);
      -webkit-background-clip: text;
      background-clip: text;
      margin-bottom: 1.25rem;
      animation: fadeUp 0.6s 0.1s ease both;
    }

    h1 {
      font-size: clamp(1.25rem, 4vw, 1.625rem);
      font-weight: 600;
      color: var(--text);
      margin-bottom: 0.875rem;
      letter-spacing: -0.02em;
      line-height: 1.3;
      animation: fadeUp 0.6s 0.15s ease both;
    }

    p {
      font-size: 1rem;
      color: var(--text-secondary);
      line-height: 1.7;
      margin-bottom: 2.25rem;
      animation: fadeUp 0.6s 0.2s ease both;
    }

    .actions {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      justify-content: center;
      animation: fadeUp 0.6s 0.25s ease both;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      font-size: 0.9375rem;
      font-weight: 500;
      padding: 0.75rem 1.5rem;
      border-radius: 10px;
      transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 2px 12px rgba(79,70,229,0.25);
    }

    .btn-primary:hover {
      background: #4338ca;
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(79,70,229,0.35);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: #fff;
      color: var(--text);
      text-decoration: none;
      font-size: 0.9375rem;
      font-weight: 500;
      padding: 0.75rem 1.5rem;
      border-radius: 10px;
      border: 1.5px solid var(--border);
      transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
    }

    .btn-secondary:hover {
      border-color: #c7c7d8;
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(26,26,46,0.08);
    }

    .footer-note {
      margin-top: 3.5rem;
      font-size: 0.8125rem;
      color: var(--text-tertiary);
      animation: fadeUp 0.6s 0.3s ease both;
    }

    .footer-note a {
      color: var(--accent);
      text-decoration: none;
    }

    .footer-note a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div class="page">

    <!-- Ilustrace — dokument s otazníkem -->
    <svg class="illustration" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <defs>
        <radialGradient id="glow" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#eef2ff"/>
          <stop offset="100%" stop-color="#fafafa" stop-opacity="0"/>
        </radialGradient>
      </defs>
      <!-- Glow circle -->
      <circle cx="90" cy="90" r="80" fill="url(#glow)"/>
      <!-- Stín dokumentu -->
      <ellipse cx="90" cy="152" rx="38" ry="6" fill="#4f46e5" opacity="0.08"/>
      <!-- Dokument -->
      <rect x="42" y="28" width="80" height="104" rx="8" fill="#ffffff" stroke="#e8e8ee" stroke-width="2"/>
      <!-- Linky textu -->
      <rect x="56" y="50" width="40" height="3.5" rx="2" fill="#c7c7de"/>
      <rect x="56" y="60" width="52" height="3.5" rx="2" fill="#e0e0ee"/>
      <rect x="56" y="70" width="44" height="3.5" rx="2" fill="#e0e0ee"/>
      <rect x="56" y="80" width="48" height="3.5" rx="2" fill="#e0e0ee"/>
      <!-- Otazník -->
      <circle cx="90" cy="108" r="22" fill="#eef2ff"/>
      <text x="90" y="116" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="#4f46e5">?</text>
    </svg>

    <div class="code">404</div>

    <h1>Stránka nenalezena</h1>
    <p>Tato adresa neexistuje nebo byla přesunuta.<br>Zkuste přejít na hlavní stránku.</p>

    <div class="actions">
      <a href="/" class="btn-primary">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <path d="M2 8l6-6 6 6M3.5 6.5V13a.5.5 0 0 0 .5.5h3V10h2v3.5h3a.5.5 0 0 0 .5-.5V6.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Zpět na hlavní stránku
      </a>
      <a href="mailto:info@prodocum.cz" class="btn-secondary">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <rect x="1.5" y="3.5" width="13" height="9" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
          <path d="M1.5 5l6.5 4.5L14.5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        Napsat nám
      </a>
    </div>

    <p class="footer-note">
      <a href="https://www.prodocum.cz">prodocum.cz</a> &nbsp;·&nbsp; ProDocum, s.r.o.
    </p>

  </div>

</body>
</html>
